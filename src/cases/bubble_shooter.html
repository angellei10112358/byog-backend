<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0a0a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    overflow: hidden;
}
#gameContainer {
    position: relative;
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(0, 100, 255, 0.2), 0 0 80px rgba(0, 50, 150, 0.1);
    border: 2px solid rgba(100, 150, 255, 0.15);
}
canvas {
    display: block;
    border-radius: 10px;
    background: linear-gradient(180deg, #0d0d2b 0%, #151540 40%, #1a1a3a 100%);
    cursor: crosshair;
    max-width: 100vw;
    max-height: 100vh;
}
#overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.75);
    border-radius: 10px;
    backdrop-filter: blur(4px);
}
#overlay.show { display: flex; }
#overlay h1 {
    font-size: 42px;
    color: #fff;
    margin-bottom: 8px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}
#overlay .sub {
    color: rgba(255,255,255,0.7);
    font-size: 18px;
    margin-bottom: 24px;
}
#overlay .score-final {
    color: #ffcc00;
    font-size: 22px;
    margin-bottom: 20px;
}
.btn {
    padding: 12px 40px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    font-weight: 600;
    margin: 4px;
}
.btn:hover { transform: scale(1.05); }
.btn:active { transform: scale(0.97); }
.btn-primary {
    background: linear-gradient(135deg, #4488ff, #2266dd);
    color: #fff;
    box-shadow: 0 4px 15px rgba(68,136,255,0.4);
}
.btn-secondary {
    background: linear-gradient(135deg, #666, #444);
    color: #fff;
    box-shadow: 0 4px 15px rgba(100,100,100,0.3);
}
</style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <h1 id="overlayTitle"></h1>
        <div class="sub" id="overlaySub"></div>
        <div class="score-final" id="overlayScore"></div>
        <div>
            <button class="btn btn-primary" id="overlayBtn1"></button>
            <button class="btn btn-secondary" id="overlayBtn2" style="display:none"></button>
        </div>
    </div>
</div>
<script>
(function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySub = document.getElementById('overlaySub');
    const overlayScore = document.getElementById('overlayScore');
    const overlayBtn1 = document.getElementById('overlayBtn1');
    const overlayBtn2 = document.getElementById('overlayBtn2');

    const CW = 500, CH = 660;
    canvas.width = CW; canvas.height = CH;

    const BR = 20, BD = 40;
    const HV = BR * Math.sqrt(3);
    const COLS = 12;
    const SX = CW / 2, SY = 600;
    const SPEED = 14;
    const NUM_COLORS = 5;
    const AIM_MIN = -3 * Math.PI / 4;
    const AIM_MAX = -Math.PI / 4;
    const LOSE_Y = 560;

    const PALETTE = [
        ['#ff5555', '#cc2222', '#ff8888'],
        ['#55aaff', '#2266cc', '#88ccff'],
        ['#55dd55', '#22aa22', '#88ee88'],
        ['#ffdd44', '#ccaa00', '#ffee88'],
        ['#dd66dd', '#aa22aa', '#ee88ee'],
    ];

    let grid = [], gridRows = 0;
    let shooterAngle = -Math.PI/2;
    let flying = null;
    let currentColor = 0, nextColor = 0;
    let score = 0, level = 1;
    let state = 'aiming';
    let mouseX = SX, mouseY = SY - 100;
    let animId = null;
    let swapHovered = false;
    let fallingBubbles = [];
    let particles = [];

    function getPos(r, c) {
        return {
            x: c * BD + (r % 2 ? BR : 0) + BR,
            y: r * HV + BR
        };
    }

    function snapCell(x, y) {
        let r = Math.round((y - BR) / HV);
        r = Math.max(0, r);
        let off = r % 2 ? BR : 0;
        let c = Math.round((x - BR - off) / BD);
        c = Math.max(0, Math.min(c, COLS - 1));
        return { r, c };
    }

    function neighbors(r, c) {
        const n = [];
        if (r % 2) {
            n.push({r:r-1,c:c},{r:r-1,c:c+1},{r:r,c:c-1},{r:r,c:c+1},{r:r+1,c:c},{r:r+1,c:c+1});
        } else {
            n.push({r:r-1,c:c-1},{r:r-1,c:c},{r:r,c:c-1},{r:r,c:c+1},{r:r+1,c:c-1},{r:r+1,c:c});
        }
        return n;
    }

    function inGrid(r, c) {
        return r >= 0 && r < grid.length && c >= 0 && c < grid[r].length;
    }

    function findMatches(r, c) {
        const color = grid[r][c];
        if (color === -1) return [];
        const visited = new Set();
        const matches = [];
        const q = [{r,c}];
        while (q.length) {
            const {r:rr,c:cc} = q.shift();
            const k = rr+','+cc;
            if (visited.has(k)) continue;
            if (!inGrid(rr,cc)) continue;
            if (grid[rr][cc] !== color) continue;
            visited.add(k);
            matches.push({r:rr,c:cc});
            for (const n of neighbors(rr,cc)) {
                if (!visited.has(n.r+','+n.c)) q.push(n);
            }
        }
        return matches;
    }

    function findFloating() {
        const connected = new Set();
        const q = [];
        if (grid.length > 0) {
            for (let c = 0; c < grid[0].length; c++) {
                if (grid[0][c] !== -1) {
                    q.push({r:0,c});
                    connected.add('0,'+c);
                }
            }
        }
        while (q.length) {
            const {r,c} = q.shift();
            for (const n of neighbors(r,c)) {
                const k = n.r+','+n.c;
                if (connected.has(k)) continue;
                if (!inGrid(n.r,n.c)) continue;
                if (grid[n.r][n.c] === -1) continue;
                connected.add(k);
                q.push(n);
            }
        }
        const float = [];
        for (let r = 0; r < grid.length; r++) {
            for (let c = 0; c < grid[r].length; c++) {
                if (grid[r][c] !== -1 && !connected.has(r+','+c)) {
                    float.push({r,c});
                }
            }
        }
        return float;
    }

    function cleanupGrid() {
        while (grid.length > 0) {
            let empty = true;
            for (let c = 0; c < grid[grid.length-1].length; c++) {
                if (grid[grid.length-1][c] !== -1) { empty = false; break; }
            }
            if (empty) grid.pop(); else break;
        }
    }

    function countBubbles() {
        let n = 0;
        for (let r = 0; r < grid.length; r++)
            for (let c = 0; c < grid[r].length; c++)
                if (grid[r][c] !== -1) n++;
        return n;
    }

    function checkCollision(bx, by) {
        for (let r = 0; r < grid.length; r++) {
            for (let c = 0; c < grid[r].length; c++) {
                if (grid[r][c] === -1) continue;
                const p = getPos(r, c);
                const dx = bx - p.x, dy = by - p.y;
                if (dx*dx + dy*dy < BD*BD) return {r,c};
            }
        }
        return null;
    }

    function genGrid(rows) {
        grid = [];
        for (let r = 0; r < rows; r++) {
            const row = [];
            for (let c = 0; c < COLS; c++) row.push(-1);
            grid.push(row);
        }
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < COLS; c++) {
                let color, att = 0;
                do {
                    color = Math.floor(Math.random() * NUM_COLORS);
                    grid[r][c] = color;
                    att++;
                } while (findMatches(r,c).length >= 3 && att < 40);
                if (att >= 40) {
                    const used = new Set();
                    for (const n of neighbors(r,c))
                        if (inGrid(n.r,n.c) && grid[n.r][n.c] !== -1)
                            used.add(grid[n.r][n.c]);
                    for (let i = 0; i < NUM_COLORS; i++)
                        if (!used.has(i)) { grid[r][c] = i; break; }
                }
            }
        }
        gridRows = rows;
    }

    function startLevel() {
        const rows = Math.min(4 + level, 14);
        genGrid(rows);
        currentColor = Math.floor(Math.random() * NUM_COLORS);
        do { nextColor = Math.floor(Math.random() * NUM_COLORS); } while (nextColor === currentColor);
        flying = null;
        state = 'aiming';
        overlay.classList.remove('show');
    }

    function swapColors() {
        if (state !== 'aiming') return;
        const tmp = currentColor;
        currentColor = nextColor;
        nextColor = tmp;
    }

    function shoot(angle) {
        if (state !== 'aiming') return;
        if (flying) return;
        flying = {
            color: currentColor,
            x: SX, y: SY,
            vx: SPEED * Math.cos(angle),
            vy: SPEED * Math.sin(angle)
        };
        currentColor = nextColor;
        do { nextColor = Math.floor(Math.random() * NUM_COLORS); } while (nextColor === currentColor);
        state = 'flying';
    }

    function checkGameOver() {
        for (let r = 0; r < grid.length; r++) {
            for (let c = 0; c < grid[r].length; c++) {
                if (grid[r][c] !== -1) {
                    if (getPos(r,c).y >= LOSE_Y) return true;
                }
            }
        }
        return false;
    }

    function snapBubble(bx, by, color) {
        let {r,c} = snapCell(bx, by);
        if (r < grid.length && grid[r][c] !== -1) {
            let best = null, bd = Infinity;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = r+dr, nc = c+dc;
                    if (!inGrid(nr,nc) || grid[nr][nc] !== -1) continue;
                    const p = getPos(nr,nc);
                    const d = (p.x-bx)*(p.x-bx) + (p.y-by)*(p.y-by);
                    if (d < bd) { bd = d; best = {r:nr,c:nc}; }
                }
            }
            if (best) { r = best.r; c = best.c; }
        }
        while (r >= grid.length) {
            const nr = [];
            for (let i = 0; i < COLS; i++) nr.push(-1);
            grid.push(nr);
        }
        grid[r][c] = color;
        flying = null;

        const matches = findMatches(r,c);
        let popped = 0;
        if (matches.length >= 3) {
            for (const m of matches) {
                const p = getPos(m.r, m.c);
                for (let i = 0; i < 6; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const s = 1 + Math.random() * 3;
                    particles.push({
                        x: p.x, y: p.y,
                        vx: Math.cos(a) * s,
                        vy: Math.sin(a) * s,
                        color: grid[m.r][m.c],
                        life: 20 + Math.random() * 20,
                        maxLife: 40,
                        size: 1.5 + Math.random() * 2.5
                    });
                }
                grid[m.r][m.c] = -1; popped++;
            }
            score += popped * 10;
            const float = findFloating();
            for (const f of float) {
                const p = getPos(f.r, f.c);
                fallingBubbles.push({
                    x: p.x, y: p.y,
                    vx: (Math.random() - 0.5) * 1.2,
                    vy: -0.3,
                    color: grid[f.r][f.c],
                    rotation: 0,
                    rotSpeed: (Math.random() - 0.5) * 0.1,
                    alpha: 1,
                    trail: []
                });
                grid[f.r][f.c] = -1; popped++;
            }
            score += float.length * 20;
        }
        cleanupGrid();

        if (countBubbles() === 0) {
            state = 'win';
            score += 100;
            showOverlay('win');
            return;
        }
        if (checkGameOver()) {
            state = 'gameover';
            showOverlay('gameover');
            return;
        }
        state = 'aiming';
    }

    function showOverlay(type) {
        if (type === 'win') {
            overlayTitle.textContent = 'Level Clear!';
            overlaySub.textContent = 'All cleared!';
            overlayScore.textContent = 'Score: ' + score;
            overlayBtn1.textContent = 'Next Level';
            overlayBtn2.style.display = 'none';
            overlayBtn1.onclick = () => { level++; startLevel(); };
        } else {
            overlayTitle.textContent = 'Game Over';
            overlaySub.textContent = 'Bubbles reached the bottom!';
            overlayScore.textContent = 'Final Score: ' + score;
            overlayBtn1.textContent = 'Restart';
            overlayBtn2.style.display = 'inline-block';
            overlayBtn2.textContent = 'Main Menu';
            overlayBtn2.onclick = () => { resetGame(); };
            overlayBtn1.onclick = () => { resetGame(); startLevel(); };
        }
        overlay.classList.add('show');
    }

    function resetGame() {
        score = 0;
        level = 1;
        startLevel();
    }

    function updateAim(mx, my) {
        const dx = mx - SX, dy = my - SY;
        let angle = Math.atan2(dy, dx);
        if (angle > -Math.PI/6) angle = -Math.PI/6;
        else if (angle < -5*Math.PI/6) angle = -5*Math.PI/6;
        shooterAngle = angle;
    }

    function predictPath() {
        let x = SX, y = SY;
        let vx = 8 * Math.cos(shooterAngle);
        let vy = 8 * Math.sin(shooterAngle);
        const pts = [{x,y}];
        for (let i = 0; i < 300; i++) {
            x += vx; y += vy;
            if (x - BR <= 0) { x = BR; vx = -vx; }
            if (x + BR >= CW) { x = CW - BR; vx = -vx; }
            if (y - BR <= 0) { pts.push({x,y}); break; }
            if (checkCollision(x,y)) { pts.push({x,y}); break; }
            if (i % 3 === 0) pts.push({x,y});
        }
        return pts;
    }

    function drawBubble(x, y, ci, r) {
        const p = PALETTE[ci];
        const g = ctx.createRadialGradient(x-r*0.35, y-r*0.35, r*0.05, x, y, r);
        g.addColorStop(0, p[2]);
        g.addColorStop(0.4, p[0]);
        g.addColorStop(1, p[1]);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x-r*0.3, y-r*0.3, r*0.25, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x-r*0.15, y-r*0.4, r*0.1, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();
    }

    function drawGrid() {
        for (let r = 0; r < grid.length; r++) {
            for (let c = 0; c < grid[r].length; c++) {
                if (grid[r][c] === -1) continue;
                const p = getPos(r,c);
                drawBubble(p.x, p.y, grid[r][c], BR-1);
            }
        }
    }

    function drawShooter() {
        const len = 28;
        const ex = SX + len * Math.cos(shooterAngle);
        const ey = SY + len * Math.sin(shooterAngle);
        ctx.beginPath();
        ctx.moveTo(SX, SY);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = '#8899bb';
        ctx.lineWidth = 10;
        ctx.lineCap = 'round';
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(SX, SY);
        ctx.lineTo(ex, ey);
        ctx.strokeStyle = '#aabbdd';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.stroke();
        const g = ctx.createRadialGradient(SX-3, SY-3, 2, SX, SY, 14);
        g.addColorStop(0, '#aabbdd');
        g.addColorStop(1, '#445566');
        ctx.beginPath();
        ctx.arc(SX, SY, 13, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.strokeStyle = '#334455';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        if (state === 'aiming') {
            drawBubble(SX, SY, currentColor, BR-2);
        }
    }

    function drawAimPath() {
        if (state !== 'aiming') return;
        const pts = predictPath();
        for (let i = 1; i < pts.length; i++) {
            const a = pts[i-1], b = pts[i];
            ctx.beginPath();
            ctx.arc(b.x, b.y, 2.5, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(200,220,255,' + (0.3 + 0.4 * (1 - i/pts.length)) + ')';
            ctx.fill();
        }
        if (pts.length > 1) {
            const last = pts[pts.length-1];
            ctx.beginPath();
            ctx.arc(last.x, last.y, BR-4, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(200,220,255,0.15)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(200,220,255,0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4,4]);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    function drawHUD() {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('Score: ' + score, 16, 30);
        ctx.textAlign = 'right';
        ctx.fillText('Level ' + level, CW-16, 30);
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = '12px "Segoe UI", Arial, sans-serif';
        ctx.fillText('Next', SX + 80, SY - 20);
        drawBubble(SX + 80, SY, nextColor, BR-5);

        const sbx = 78, sby = 624, sbw = 88, sbh = 28;
        const inBtn = mouseX >= sbx && mouseX <= sbx+sbw && mouseY >= sby && mouseY <= sby+sbh;
        swapHovered = inBtn;
        ctx.textAlign = 'center';
        ctx.fillStyle = inBtn ? 'rgba(100,180,255,0.25)' : 'rgba(100,150,200,0.12)';
        ctx.strokeStyle = inBtn ? 'rgba(100,180,255,0.5)' : 'rgba(100,150,200,0.25)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(sbx, sby, sbw, sbh, 6);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = inBtn ? 'rgba(200,230,255,0.9)' : 'rgba(180,200,220,0.55)';
        ctx.font = 'bold 13px "Segoe UI", Arial, sans-serif';
        ctx.fillText('⇄ Swap', sbx + sbw/2, sby + sbh/2 + 5);

        ctx.textAlign = 'right';
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.font = '11px "Segoe UI", Arial, sans-serif';
        ctx.fillText('Click to shoot · Aim with mouse · S to swap', CW - 16, CH - 14);
        if (state === 'gameover' || state === 'win') {
            ctx.fillStyle = 'rgba(255,255,255,0.04)';
            ctx.fillRect(0, 0, CW, CH);
        }
    }

    function drawGridLines() {
        ctx.strokeStyle = 'rgba(100,150,255,0.04)';
        ctx.lineWidth = 1;
        for (let r = 0; r < 18; r++) {
            const y = r * HV + BR;
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(CW, y);
            ctx.stroke();
        }
    }

    function drawStars() {
        const t = Date.now() / 6000;
        for (let i = 0; i < 30; i++) {
            const x = (i * 137.5 + 50) % CW;
            const y = (i * 97.3 + 20) % (CH * 0.6);
            const s = 0.5 + (i % 3) * 0.5;
            const a = 0.08 + 0.12 * Math.sin(t + i * 1.7);
            ctx.beginPath();
            ctx.arc(x, y, s, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(200,220,255,' + a + ')';
            ctx.fill();
        }
    }

    function update() {
        if (state === 'flying' && flying) {
            flying.x += flying.vx;
            flying.y += flying.vy;
            if (flying.x - BR <= 0) { flying.x = BR; flying.vx = -flying.vx; }
            if (flying.x + BR >= CW) { flying.x = CW - BR; flying.vx = -flying.vx; }
            if (flying.y - BR <= 0) {
                snapBubble(flying.x, BR, flying.color);
                return;
            }
            const col = checkCollision(flying.x, flying.y);
            if (col) {
                snapBubble(flying.x, flying.y, flying.color);
                return;
            }
        }

        for (let i = fallingBubbles.length - 1; i >= 0; i--) {
            const fb = fallingBubbles[i];
            fb.trail.push({x: fb.x, y: fb.y});
            if (fb.trail.length > 8) fb.trail.shift();
            fb.vy += 0.3;
            fb.x += fb.vx;
            fb.y += fb.vy;
            fb.vx *= 0.99;
            fb.rotation += fb.rotSpeed;
            fb.alpha -= 0.008;
            if (fb.y > CH + BR * 2 || fb.alpha <= 0) {
                fallingBubbles.splice(i, 1);
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.06;
            p.vx *= 0.98;
            p.life--;
            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
    }

    function drawFallingBubble(fb) {
        for (let i = 0; i < fb.trail.length; i++) {
            const t = fb.trail[i];
            const ta = fb.alpha * (i / fb.trail.length) * 0.4;
            const r = (BR - 2) * (0.3 + 0.7 * (i / fb.trail.length));
            ctx.beginPath();
            ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(180,200,255,' + ta.toFixed(3) + ')';
            ctx.fill();
        }
        ctx.save();
        ctx.globalAlpha = Math.max(0, fb.alpha);
        ctx.translate(fb.x, fb.y);
        ctx.rotate(fb.rotation);
        const p = PALETTE[fb.color];
        const g = ctx.createRadialGradient(-BR*0.3, -BR*0.3, BR*0.05, 0, 0, BR-2);
        g.addColorStop(0, p[2]);
        g.addColorStop(0.4, p[0]);
        g.addColorStop(1, p[1]);
        ctx.beginPath();
        ctx.arc(0, 0, BR - 2, 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.restore();
    }

    function drawParticles() {
        for (const p of particles) {
            const t = p.life / p.maxLife;
            const r = p.size * t;
            const a = t;
            ctx.globalAlpha = a;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE[p.color][0];
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }

    function render() {
        ctx.clearRect(0, 0, CW, CH);
        const bg = ctx.createLinearGradient(0, 0, 0, CH);
        bg.addColorStop(0, '#0d0d2b');
        bg.addColorStop(0.5, '#14143d');
        bg.addColorStop(1, '#0f0f25');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, CW, CH);
        drawStars();
        drawGridLines();
        drawAimPath();
        drawGrid();
        for (const fb of fallingBubbles) drawFallingBubble(fb);
        drawParticles();
        if (state === 'flying' && flying) {
            drawBubble(flying.x, flying.y, flying.color, BR-1);
        }
        drawShooter();
        drawHUD();
    }

    function loop() {
        update();
        render();
        animId = requestAnimationFrame(loop);
    }

    function handleMove(mx, my) {
        const rect = canvas.getBoundingClientRect();
        const sx = (mx - rect.left) * (CW / rect.width);
        const sy = (my - rect.top) * (CH / rect.height);
        mouseX = Math.max(0, Math.min(sx, CW));
        mouseY = Math.max(0, Math.min(sy, CH));
        if (state === 'aiming') updateAim(mouseX, mouseY);
    }

    function handleClick(cx, cy) {
        const rect = canvas.getBoundingClientRect();
        const sx = (cx - rect.left) * (CW / rect.width);
        const sy = (cy - rect.top) * (CH / rect.height);
        const sbx = 78, sby = 624, sbw = 88, sbh = 28;
        if (sx >= sbx && sx <= sbx+sbw && sy >= sby && sy <= sby+sbh) {
            if (state === 'aiming') swapColors();
            return;
        }
        if (state === 'aiming') shoot(shooterAngle);
    }

    canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
    canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));

    document.addEventListener('keydown', e => {
        if (e.key === 's' || e.key === 'S') {
            if (state === 'aiming') swapColors();
            e.preventDefault();
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        const t = e.touches[0];
        handleMove(t.clientX, t.clientY);
    }, {passive: false});
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        handleMove(t.clientX, t.clientY);
        handleShoot();
    }, {passive: false});

    resetGame();
    loop();
})();
</script>
</body>
</html>
