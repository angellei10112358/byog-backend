<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body {
  background: #faf8ef;
  font-family: 'Segoe UI', 'Clear Sans', Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 16px;
}
.container {
  width: 100%;
  max-width: 500px;
}
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.title {
  font-size: 64px;
  font-weight: 900;
  color: #776e65;
  line-height: 1;
}
.scores {
  display: flex;
  gap: 8px;
}
.score-box {
  background: #bbada0;
  color: #fff;
  border-radius: 6px;
  padding: 6px 16px;
  text-align: center;
  min-width: 72px;
}
.score-box .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  opacity: 0.8;
}
.score-box .value {
  font-size: 22px;
  font-weight: 700;
}
.sub-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.hint {
  color: #776e65;
  font-size: 13px;
  opacity: 0.7;
}
.btn {
  background: #8f7a66;
  color: #f9f6f2;
  border: none;
  border-radius: 6px;
  padding: 8px 20px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.btn:hover { background: #7a6656; }
.settings {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.settings label {
  font-size: 13px;
  color: #776e65;
  font-weight: 600;
}
.settings input,
.settings select {
  padding: 4px 8px;
  border: 2px solid #d6cdc4;
  border-radius: 4px;
  font-size: 14px;
  text-align: center;
  color: #776e65;
  background: #fff;
  outline: none;
}
.settings input { width: 52px; }
.settings select { width: auto; min-width: 90px; cursor: pointer; }
.settings input:focus,
.settings select:focus { border-color: #8f7a66; }
.settings .btn-resize { font-size: 13px; padding: 4px 14px; }
.grid-container {
  position: relative;
  background: #bbada0;
  border-radius: 8px;
  padding: 8px;
  touch-action: none;
}
.grid {
  display: grid;
  gap: 8px;
}
.cell {
  background: rgba(238, 228, 218, 0.35);
  border-radius: 4px;
  aspect-ratio: 1;
}
.tile-container {
  position: absolute;
  top: 8px;
  left: 8px;
  right: 8px;
  bottom: 8px;
}
.tile {
  position: absolute;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: 800;
  border-radius: 4px;
  transition: left 0.1s ease, top 0.1s ease;
  z-index: 1;
}
.tile-new {
  animation: appear 0.2s ease;
}
.tile-merged {
  animation: pop 0.2s ease;
  z-index: 2;
}
@keyframes appear {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(250, 248, 239, 0.73);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  border-radius: 8px;
  z-index: 10;
  gap: 12px;
  padding: 16px;
  text-align: center;
}
.overlay.hidden { display: none; }
.overlay .msg { font-size: 48px; font-weight: 900; color: #776e65; }
.overlay .sub-msg { font-size: 18px; color: #776e65; }
.overlay .btn { font-size: 16px; padding: 10px 28px; }
.tile-2    { background: #eee4da; color: #776e65; }
.tile-4    { background: #ede0c8; color: #776e65; }
.tile-8    { background: #f2b179; color: #f9f6f2; }
.tile-16   { background: #f59563; color: #f9f6f2; }
.tile-32   { background: #f67c5f; color: #f9f6f2; }
.tile-64   { background: #f65e3b; color: #f9f6f2; }
.tile-128  { background: #edcf72; color: #f9f6f2; font-size: 0.9em; }
.tile-256  { background: #edcc61; color: #f9f6f2; font-size: 0.9em; }
.tile-512  { background: #edc850; color: #f9f6f2; font-size: 0.9em; }
.tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 0.7em; }
.tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 0.7em; }
.tile-super { background: #3c3a32; color: #f9f6f2; }
</style>

  let cellSize = 0;
  let gameOver = false;
  let won = false;
  let keepPlaying = false;
  let overlayMode = null;

    2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
    32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61',

  };
  const LIGHT_TEXT = '#f9f6f2';
  const DARK_TEXT = '#776e65';

  let currentLang = localStorage.getItem('2048lang') || 'en';
  langSelect.value = currentLang;

  function t(key) {
    return (LANG[currentLang] && LANG[currentLang][key]) || LANG.en[key] || key;
  }

  function applyLanguage() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = t(key);
    });
    if (!overlay.classList.contains('hidden')) {
      if (overlayMode === 'win') {
        overlayMsg.textContent = t('youWin');
        overlaySub.textContent = t('reached');
        overlayBtn.textContent = t('keepPlaying');
      } else if (overlayMode === 'over') {
        overlayMsg.textContent = t('gameOver');
        overlaySub.textContent = t('finalScore') + ': ' + score;
        overlayBtn.textContent = t('tryAgain');
      }
    }
  }

  langSelect.addEventListener('change', () => {
    currentLang = langSelect.value;
    localStorage.setItem('2048lang', currentLang);
    applyLanguage();
  });

  function tileColor(val) {
    return TILE_COLORS[val] || '#3c3a32';
  }
  function textColor(val) {
    return val <= 4 ? DARK_TEXT : LIGHT_TEXT;
  }
  function tileFontSize(val) {
    const s = val.toString().length;
    if (s <= 2) return cellSize * 0.45;
    if (s === 3) return cellSize * 0.35;
    if (s === 4) return cellSize * 0.28;
    return cellSize * 0.22;
  }

  function computeCellSize() {
    const w = container.getBoundingClientRect().width;
    const contentW = w - 16;
    cellSize = Math.floor((contentW - cellGap * (cols - 1)) / cols);
  }

  function cellPos(r, c) {
    return {
      left: c * (cellSize + cellGap),
      top: r * (cellSize + cellGap)
    };
  }

  function initGrid(r, c) {
    rows = r; cols = c;
    grid = Array.from({ length: rows }, () => Array(cols).fill(0));
    score = 0;
    gameOver = false;
    won = false;
    keepPlaying = false;
    overlayMode = null;
    scoreEl.textContent = '0';
    overlay.classList.add('hidden');
    renderGrid();
    addRandomTile();
    addRandomTile();
    renderTiles(null);
  }

  function renderGrid() {
    gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    gridEl.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
    gridEl.innerHTML = '';
    for (let i = 0; i < rows * cols; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      gridEl.appendChild(cell);
    }
    computeCellSize();
  }

  function renderTiles(anim) {
    tileContainer.innerHTML = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const val = grid[r][c];
        if (val === 0) continue;
        const el = document.createElement('div');
        el.className = 'tile';
        const pos = cellPos(r, c);
        el.style.width = cellSize + 'px';
        el.style.height = cellSize + 'px';
        el.style.left = pos.left + 'px';
        el.style.top = pos.top + 'px';
        el.style.background = tileColor(val);
        el.style.color = textColor(val);
        el.style.fontSize = tileFontSize(val) + 'px';
        el.textContent = val;
        if (anim) {
          if (anim.newPos && anim.newPos.r === r && anim.newPos.c === c) {
            el.classList.add('tile-new');
          }
          if (anim.merged && anim.merged.some(m => m.r === r && m.c === c)) {
            el.classList.add('tile-merged');
          }
        }
        tileContainer.appendChild(el);
      }
    }
  }

  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    if (empty.length === 0) return null;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return { r, c };
  }

  function slideLine(line) {
    const filtered = line.filter(v => v !== 0);
    const result = [];
    let scored = 0;
    let i = 0;
    while (i < filtered.length) {
      if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
        const v = filtered[i] * 2;
        result.push(v);
        scored += v;
        i += 2;
      } else {
        result.push(filtered[i]);
        i++;
      }
    }
    while (result.length < line.length) result.push(0);
    return { merged: result, scored };
  }

  function moveLeft() {
    let moved = false, total = 0;
    for (let r = 0; r < rows; r++) {
      const { merged, scored } = slideLine(grid[r]);
      total += scored;
      for (let c = 0; c < cols; c++) {
        if (grid[r][c] !== merged[c]) moved = true;
        grid[r][c] = merged[c];
      }
    }
    return { moved, score: total };
  }

  function moveRight() {
    let moved = false, total = 0;
    for (let r = 0; r < rows; r++) {
      const rev = [...grid[r]].reverse();
      const { merged, scored } = slideLine(rev);
      total += scored;
      const result = merged.reverse();
      for (let c = 0; c < cols; c++) {
        if (grid[r][c] !== result[c]) moved = true;
        grid[r][c] = result[c];
      }
    }
    return { moved, score: total };
  }

  function moveUp() {
    let moved = false, total = 0;
    for (let c = 0; c < cols; c++) {
      const col = [];
      for (let r = 0; r < rows; r++) col.push(grid[r][c]);
      const { merged, scored } = slideLine(col);
      total += scored;
      for (let r = 0; r < rows; r++) {
        if (grid[r][c] !== merged[r]) moved = true;
        grid[r][c] = merged[r];
      }
    }
    return { moved, score: total };
  }

  function moveDown() {
    let moved = false, total = 0;
    for (let c = 0; c < cols; c++) {
      const col = [];
      for (let r = rows - 1; r >= 0; r--) col.push(grid[r][c]);
      const { merged, scored } = slideLine(col);
      total += scored;
      const result = merged.reverse();
      for (let r = 0; r < rows; r++) {
        if (grid[r][c] !== result[r]) moved = true;
        grid[r][c] = result[r];
      }
    }
    return { moved, score: total };
  }

  function isGameOver() {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++) {
        if (grid[r][c] === 0) return false;
        if (c + 1 < cols && grid[r][c] === grid[r][c + 1]) return false;
        if (r + 1 < rows && grid[r][c] === grid[r + 1][c]) return false;
      }
    return true;
  }

  function hasWon() {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (grid[r][c] === 2048) return true;
    return false;
  }

  function handleMove(dir) {
    if (gameOver) return;
    let result;
    switch (dir) {
      case 'left': result = moveLeft(); break;
      case 'right': result = moveRight(); break;
      case 'up': result = moveUp(); break;
      case 'down': result = moveDown(); break;
    }
    if (!result.moved) return;
    score += result.score;
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('2048best', best);
    }
    const tile = addRandomTile();
    renderTiles({ newPos: tile, merged: [] });
    if (hasWon() && !keepPlaying) {
      won = true;
      overlayMode = 'win';
      overlayMsg.textContent = t('youWin');
      overlaySub.textContent = t('reached');
      overlayBtn.textContent = t('keepPlaying');
      overlay.classList.remove('hidden');
      return;
    }
    if (isGameOver()) {
      gameOver = true;
      overlayMode = 'over';
      overlayMsg.textContent = t('gameOver');
      overlaySub.textContent = t('finalScore') + ': ' + score;
      overlayBtn.textContent = t('tryAgain');
      overlay.classList.remove('hidden');
    }
  }

  document.addEventListener('keydown', (e) => {
    const map = {
      ArrowLeft: 'left', ArrowUp: 'up', ArrowRight: 'right', ArrowDown: 'down',
      a: 'left', w: 'up', d: 'right', s: 'down',
      A: 'left', W: 'up', D: 'right', S: 'down'
    };
    const dir = map[e.key];
    if (dir) { e.preventDefault(); handleMove(dir); }
  });

  let startX = 0, startY = 0, dragging = false;
  container.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.btn') || e.target.closest('.settings')) return;
    startX = e.clientX;
    startY = e.clientY;
    dragging = true;
    container.setPointerCapture(e.pointerId);
  });
  container.addEventListener('pointerup', (e) => {
    if (!dragging) return;
    dragging = false;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 20) return;
    handleMove(Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  });
  container.addEventListener('pointercancel', () => { dragging = false; });

  overlayBtn.addEventListener('click', () => {
    if (overlayMode === 'win') {
      keepPlaying = true;
      overlayMode = null;
      overlay.classList.add('hidden');
      if (isGameOver()) {
        gameOver = true;
        overlayMode = 'over';
        overlayMsg.textContent = t('gameOver');
        overlaySub.textContent = t('finalScore') + ': ' + score;
        overlayBtn.textContent = t('tryAgain');
        overlay.classList.remove('hidden');
      }
    } else {
      resizeGame();
    }
  });

  function resizeGame() {
    let r = parseInt(rowsInput.value) || 4;
    let c = parseInt(colsInput.value) || 4;
    r = Math.max(2, Math.min(10, r));
    c = Math.max(2, Math.min(10, c));
    rowsInput.value = r;
    colsInput.value = c;
    initGrid(r, c);
  }

  document.getElementById('newGameBtn').addEventListener('click', resizeGame);
  document.getElementById('resizeBtn').addEventListener('click', resizeGame);

  initGrid(4, 4);
  applyLanguage();
})();
</script>
</body>
</html>
